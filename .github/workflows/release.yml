name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (set these secrets in your repo settings):
          # APPLE_CERTIFICATE: base64-encoded .p12 certificate
          # APPLE_CERTIFICATE_PASSWORD: certificate password
          # APPLE_SIGNING_IDENTITY: "Developer ID Application: Your Name (TEAMID)"
          # APPLE_ID: your Apple ID email
          # APPLE_PASSWORD: app-specific password
          # APPLE_TEAM_ID: your team ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voice Assistant ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-universal:
    runs-on: macos-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri universal binary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voice Assistant ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  update-homebrew:
    runs-on: macos-latest
    needs: [build-universal]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Wait for release assets
        run: |
          # Give GitHub a moment to finalize the release assets
          sleep 30

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download universal DMG and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # The DMG filename pattern from tauri-action
          DMG_NAME="Voice Assistant_${VERSION}_universal.dmg"

          # Download the DMG from the release
          gh release download "$GITHUB_REF_NAME" \
            --pattern "*.dmg" \
            --dir /tmp/release-assets || true

          # Find the universal DMG
          DMG_FILE=$(find /tmp/release-assets -name "*universal*.dmg" -o -name "*.dmg" | head -1)

          if [ -z "$DMG_FILE" ]; then
            echo "::warning::No DMG found in release assets. Skipping Homebrew update."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SHA=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')
          FILENAME=$(basename "$DMG_FILE")
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"
          echo "File: $FILENAME"

      - name: Update Homebrew tap
        if: steps.sha.outputs.skip != 'true'
        env:
          # PAT with repo scope for the homebrew-tap repo
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA256=${{ steps.sha.outputs.sha256 }}
          FILENAME=${{ steps.sha.outputs.filename }}
          REPO_OWNER=${{ github.repository_owner }}

          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set. Skipping tap update."
            echo "To enable auto-updates, create a PAT and add it as a secret."
            exit 0
          fi

          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${REPO_OWNER}/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Casks

          # Write the updated cask formula
          cat > Casks/voice-assistant.rb << CASK_EOF
          cask "voice-assistant" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPO_OWNER}/animated-tribble/releases/download/v#{version}/${FILENAME}"
            name "Voice Assistant"
            desc "macOS push-to-talk voice assistant with local Parakeet STT"
            homepage "https://github.com/${REPO_OWNER}/animated-tribble"

            app "Voice Assistant.app"

            zap trash: [
              "~/Library/Application Support/com.voice-assistant.app",
              "~/Library/Caches/com.voice-assistant.app",
              "~/Library/Preferences/com.voice-assistant.app.plist",
            ]
          end
          CASK_EOF

          # Remove leading whitespace from heredoc indentation
          sed -i '' 's/^          //' Casks/voice-assistant.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/voice-assistant.rb
          git commit -m "Update voice-assistant to v${VERSION}" || echo "No changes to commit"
          git push origin main
