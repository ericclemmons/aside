name: Prepare Release

on:
  push:
    branches: [main]
    tags-ignore: ["**"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TAP_TOKEN }}

      - name: Skip version bump commits
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^v[0-9]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Gather context for version bump
        if: steps.check.outputs.skip == 'false'
        id: context
        run: |
          CURRENT_VERSION=$(grep -A1 CFBundleShortVersionString Aside/Sources/Aside/Info.plist | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges)
          fi

          # Skip if no new commits
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          # Save commits for prompt (truncate to fit in env var)
          {
            echo "commits<<COMMITS_EOF"
            echo "$COMMITS" | head -50
            echo "COMMITS_EOF"
          } >> $GITHUB_OUTPUT

      - name: Determine version with Claude
        if: steps.check.outputs.skip == 'false' && steps.context.outputs.skip != 'true'
        id: version
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a release manager. Determine the next semantic version bump.

            Current version: ${{ steps.context.outputs.current_version }}
            Last tag: ${{ steps.context.outputs.last_tag }}

            Commits since last release:
            ```
            ${{ steps.context.outputs.commits }}
            ```

            Rules:
            - MAJOR: breaking changes to user-facing behavior, incompatible API changes
            - MINOR: new features, new commands, significant enhancements
            - PATCH: bug fixes, refactoring, documentation, CI changes, minor tweaks

            Write JUST the version number (e.g. "1.0.1") to /tmp/next_version.txt using the Write tool. Nothing else.
          claude_args: "--allowedTools Write"

      - name: Apply version bump
        if: steps.check.outputs.skip == 'false' && steps.context.outputs.skip != 'true'
        run: |
          if [ ! -f /tmp/next_version.txt ]; then
            echo "::warning::Claude did not produce a version, falling back to patch bump"
            CURRENT="${{ steps.context.outputs.current_version }}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            NEXT_VERSION=$(cat /tmp/next_version.txt | tr -d '[:space:]')
          fi

          if [ -z "$NEXT_VERSION" ]; then
            echo "::error::Empty version"
            exit 1
          fi

          # Validate semver format
          if ! echo "$NEXT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $NEXT_VERSION"
            exit 1
          fi

          CURRENT="${{ steps.context.outputs.current_version }}"
          if [ "$NEXT_VERSION" = "$CURRENT" ]; then
            echo "Version unchanged ($CURRENT), incrementing patch"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          # Skip if already tagged
          if git rev-parse "v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "Version v${NEXT_VERSION} already tagged, skipping"
            exit 0
          fi

          echo "Bumping version: $CURRENT → $NEXT_VERSION"

          # Update both Info.plist files (source + bundle copy)
          sed -i "s|<string>${CURRENT}</string>|<string>${NEXT_VERSION}</string>|" Aside/Sources/Aside/Info.plist
          sed -i "s|<string>${CURRENT}</string>|<string>${NEXT_VERSION}</string>|" Aside/Aside.app/Contents/Info.plist

          # Verify
          grep -A1 CFBundleShortVersionString Aside/Sources/Aside/Info.plist

          # Commit, tag, push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Aside/Sources/Aside/Info.plist Aside/Aside.app/Contents/Info.plist
          git commit -m "v${NEXT_VERSION}"
          git tag "v${NEXT_VERSION}"
          git push origin main
          git push origin "v${NEXT_VERSION}"
