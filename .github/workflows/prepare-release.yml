name: Prepare Release

on:
  push:
    branches: [main]
    tags-ignore: ["**"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TAP_TOKEN }}

      - name: Skip version bump commits
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^v[0-9]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump patch version
        if: steps.check.outputs.skip == 'false'
        run: |
          CURRENT=$(grep -A1 CFBundleShortVersionString Aside/Sources/Aside/Info.plist | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"

          # Skip if already tagged
          if git rev-parse "v${NEXT}" >/dev/null 2>&1; then
            echo "v${NEXT} already tagged, skipping"
            exit 0
          fi

          echo "Bumping version: $CURRENT → $NEXT"

          sed -i "s|<string>${CURRENT}</string>|<string>${NEXT}</string>|" Aside/Sources/Aside/Info.plist
          sed -i "s|<string>${CURRENT}</string>|<string>${NEXT}</string>|" Aside/Aside.app/Contents/Info.plist

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Aside/Sources/Aside/Info.plist Aside/Aside.app/Contents/Info.plist
          git commit -m "v${NEXT}"
          git tag "v${NEXT}"
          git push origin main
          git push origin "v${NEXT}"
