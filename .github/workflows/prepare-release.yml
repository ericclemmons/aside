name: Prepare Release

on:
  push:
    branches: [main]
    tags-ignore: ["**"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TAP_TOKEN }}

      - name: Skip version bump commits
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^bump version to"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version from Info.plist
        if: steps.check.outputs.skip == 'false'
        id: info
        run: |
          VERSION=$(grep -A1 CFBundleShortVersionString Aside/Aside.app/Contents/Info.plist | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')

          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from Info.plist"
            exit 1
          fi

          # Skip if this version is already tagged
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version v${VERSION} already tagged, skipping"
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Tag and push
        if: steps.check.outputs.skip == 'false' && steps.info.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v${VERSION}"
          git push origin "v${VERSION}"
